name: API CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'URL del backend desplegado'
        required: true
      environment:
        description: 'Entorno (dev/prod)'
        required: true

jobs:

  lint:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Lint openapi.yaml
        run: echo "[SIMULADO] Ejecutando lint sobre openapi.yaml... OK"

  deploy-efimero:
    if: github.event_name == 'push'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Desplegar entorno efímero
        run: echo "[SIMULADO] Desplegando entorno efímero con mock... OK"

  notify-back:
    if: github.event_name == 'push'
    needs: deploy-efimero
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.BACK_REPO_TOKEN }}
      ORG: ${{ vars.ORG }}
      BACK_REPO: ${{ vars.BACK_REPO }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Comprobar si existe el repo de back y notificar
        run: |
          set -euo pipefail

          VERSION=$(grep 'version:' openapi.yaml | head -1 | awk '{print $2}' | tr -d '"')
          echo "Version del contrato: $VERSION"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$ORG/$BACK_REPO")

          echo "Estado del repo $ORG/$BACK_REPO: HTTP $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "404" ]; then
            echo "==> Repo no existe. Creando $ORG/$BACK_REPO..."

            gh repo create "$ORG/$BACK_REPO" --public

            BACK_CHANGES_CONTENT=$(printf '# Back Changes\n\nEdita este fichero y haz push para simular que el equipo de back ha adaptado el codigo y esta listo para desplegar.\n' | base64 -w 0)
            gh api "repos/$ORG/$BACK_REPO/contents/BACK_CHANGES.md" \
              --method PUT \
              -f message="chore: initial commit" \
              -f content="$BACK_CHANGES_CONTENT"

            BACK_CI_CONTENT=$(base64 -w 0 templates/back-ci.yaml)
            gh api "repos/$ORG/$BACK_REPO/contents/.github/workflows/back-ci.yaml" \
              --method PUT \
              -f message="ci: add back-ci workflow" \
              -f content="$BACK_CI_CONTENT"

            {
              echo "## Nuevo contrato API — v${VERSION}"
              echo ""
              echo "El pipeline ha detectado que el repo de back no existia y lo ha creado automaticamente."
              echo "Revisa el contrato completo, adapta el codigo y haz push a \`main\`."
              echo ""
              echo "\`\`\`yaml"
              cat openapi.yaml
              echo "\`\`\`"
            } > /tmp/issue-body.md

            gh issue create \
              --repo "$ORG/$BACK_REPO" \
              --title "[CREACION] API LeadMind v${VERSION} — Nuevo contrato" \
              --body-file /tmp/issue-body.md

            echo "==> Repo creado e issue de creacion abierto."

          else
            echo "==> Repo ya existe. Creando issue con diff..."

            if git rev-parse HEAD~1 > /dev/null 2>&1; then
              DIFF=$(git diff HEAD~1 HEAD -- openapi.yaml)
            else
              DIFF="(Sin commit anterior para comparar — primera version del contrato)"
            fi

            {
              echo "## Cambios en el contrato API — v${VERSION}"
              echo ""
              echo "Se han detectado cambios en \`openapi.yaml\`. Revisa el diff, adapta el codigo y haz push a \`main\`."
              echo ""
              echo "\`\`\`diff"
              echo "$DIFF"
              echo "\`\`\`"
            } > /tmp/issue-body.md

            gh issue create \
              --repo "$ORG/$BACK_REPO" \
              --title "[ACTUALIZACION] API LeadMind v${VERSION} — Cambios en contrato" \
              --body-file /tmp/issue-body.md

            echo "==> Issue de actualizacion abierto."
          fi

  update-apim:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar API Gateway
        run: |
          echo "[SIMULADO] Actualizando URL en AWS API Gateway: ${{ inputs.backend_url }} para entorno ${{ inputs.environment }}... OK"

  newman:
    if: github.event_name == 'workflow_dispatch'
    needs: update-apim
    runs-on: ubuntu-latest
    steps:
      - name: Tests de contrato Newman
        run: |
          echo "[SIMULADO] Ejecutando tests de contrato con Newman contra ${{ inputs.backend_url }}... OK"

  zap:
    if: github.event_name == 'workflow_dispatch'
    needs: newman
    runs-on: ubuntu-latest
    steps:
      - name: Analisis de seguridad OWASP ZAP
        run: echo "[SIMULADO] Ejecutando analisis de seguridad OWASP ZAP... OK"

  notify-jira-confluence:
    if: github.event_name == 'workflow_dispatch'
    needs: zap
    runs-on: ubuntu-latest
    steps:
      - name: Publicar en Jira y Confluence
        run: echo "[SIMULADO] Publicando resultados en Jira y Confluence... OK"
